version: "3.9"

# PRADY OS Phase 0 — dev environment
# Each plane runs as its own container, sharing the audit log volume.
# In production, these become systemd units on a single Sovereign host.

services:
  titan-ops:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    container_name: pradyos-titan-ops
    command: ["python", "-m", "pradyos.titan_ops.daemon"]
    volumes:
      - audit:/app/var/log
      - state:/app/var/state
      - titan-socket:/run/pradyos
    environment:
      PRADYOS_TITAN_SOCKET: /run/pradyos/titan.sock
      PRADYOS_AUDIT_PATH: /app/var/log/audit.jsonl
    restart: unless-stopped

  warden-grid:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    container_name: pradyos-warden-grid
    command: ["python", "-m", "pradyos.warden_grid.monitor"]
    ports:
      - "9701:9701"
    volumes:
      - audit:/app/var/log
    environment:
      PRADYOS_WARDEN_HOST: 0.0.0.0
      PRADYOS_WARDEN_PORT: "9701"
      PRADYOS_AUDIT_PATH: /app/var/log/audit.jsonl
    restart: unless-stopped
    privileged: true   # WARDEN GRID needs host telemetry visibility

  imperium:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    container_name: pradyos-imperium
    command: ["python", "-m", "pradyos.imperium.kernel"]
    depends_on:
      - titan-ops
      - warden-grid
    volumes:
      - audit:/app/var/log
      - state:/app/var/state
      - titan-socket:/run/pradyos
    environment:
      PRADYOS_TITAN_SOCKET: /run/pradyos/titan.sock
      PRADYOS_WARDEN_URL: http://warden-grid:9701
      PRADYOS_AUDIT_PATH: /app/var/log/audit.jsonl
      PRADYOS_STATE_PATH: /app/var/state
    restart: unless-stopped

volumes:
  audit:
  state:
  titan-socket:
