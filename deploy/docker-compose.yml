# PRADY OS — Sovereign Edition
# docker-compose.yml (Phase 7G)
#
# Services:
#   sovereign   — main web API (FastAPI / uvicorn)
#   repl        — interactive CLI REPL (one-shot / interactive)
#
# Usage:
#   docker compose up sovereign         # start web API
#   docker compose run --rm repl        # open REPL session
#   docker compose up --build           # rebuild + start all

version: "3.9"

x-common-env: &common-env
  PRADYOS_LOG_LEVEL: "${PRADYOS_LOG_LEVEL:-INFO}"
  PRADYOS_MAX_CAMPAIGN_WORKERS: "${PRADYOS_MAX_CAMPAIGN_WORKERS:-4}"
  PRADYOS_ORACLE_URL: "${PRADYOS_ORACLE_URL:-}"
  SOVEREIGN_CIRCUIT_THRESHOLD: "${SOVEREIGN_CIRCUIT_THRESHOLD:-5}"
  SOVEREIGN_CIRCUIT_RESET_SEC: "${SOVEREIGN_CIRCUIT_RESET_SEC:-60}"

services:
  sovereign:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: runtime
    image: pradyos-sovereign:latest
    container_name: pradyos-sovereign
    restart: unless-stopped
    ports:
      - "${SOVEREIGN_PORT:-8000}:8000"
    environment:
      <<: *common-env
    volumes:
      # Persist audit + campaign archives across restarts
      - pradyos-data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/metrics')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  repl:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: runtime
    image: pradyos-sovereign:latest
    container_name: pradyos-repl
    stdin_open: true
    tty: true
    environment:
      <<: *common-env
    volumes:
      - pradyos-data:/app/data
    entrypoint: ["/venv/bin/pradyos-repl"]
    profiles:
      - repl  # only started explicitly: docker compose --profile repl run repl

volumes:
  pradyos-data:
    driver: local
