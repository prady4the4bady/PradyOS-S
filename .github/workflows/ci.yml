# PRADY OS — CI Pipeline (Phase 7G)
# Runs on every push and PR to main/master
# Jobs: lint → test → prove (35/35 required)

name: PRADY OS CI

on:
  push:
    branches: [main, master, "phase/**"]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Lint with Ruff
  # --------------------------------------------------------------------------
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Ruff
        run: pip install ruff==0.4.4

      - name: Run Ruff check
        run: ruff check pradyos/ --line-length 100

      - name: Run Ruff format check
        run: ruff format --check pradyos/ --line-length 100

  # --------------------------------------------------------------------------
  # Job 2: Full test suite (pytest)
  # --------------------------------------------------------------------------
  test:
    name: Test Suite (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-asyncio pytest-timeout

      - name: Run pytest
        run: |
          pytest tests/ -v --timeout=60 --tb=short

  # --------------------------------------------------------------------------
  # Job 3: Sovereign Prove (35/35 PASS required)
  # --------------------------------------------------------------------------
  prove:
    name: Sovereign Prove (35/35)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-asyncio pytest-timeout

      - name: Run prove.py (must exit 0 with 35/35 PASS)
        run: python scripts/prove.py

  # --------------------------------------------------------------------------
  # Job 4: Docker build smoke test
  # --------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          target: runtime
          push: false
          tags: pradyos-sovereign:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
